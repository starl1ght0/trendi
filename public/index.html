<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренд График (MsgPack + Infinite Scroll)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button id="toggle-settings" class="toggle-btn">Настройки</button>
            <h1>Тренды данных</h1>
        </div>

        <div class="fixed-controls">
            <button id="load-btn">Обновить график</button>
            <div class="last-update" id="lastUpdateTime">Обновлено: —</div>
        </div>

        <div id="settings-panel" class="settings-panel hidden">
            <div class="controls">
                <div class="control-group">
                    <label for="column">Колонка Y:</label>
                    <select id="column">
                        <option value="value">value</option>
                        <option value="p1">p1</option>
                        <option value="p2">p2</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="start">Начало интервала:</label>
                    <input type="datetime-local" id="start">
                </div>
                <div class="control-group">
                    <label for="end">Конец интервала:</label>
                    <input type="datetime-local" id="end">
                </div>
                <div class="control-group">
                    <label for="line-color">Цвет:</label>
                    <select id="line-color">
                        <option value="#4dc9f6" selected>Голубой</option>
                        <option value="#ff6384">Розовый</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>

        <div class="scroll-container" id="scrollContainer">
            <input type="range" id="timeRange" min="0" max="0" value="0">
        </div>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/msgpack5@6.0.2/dist/msgpack5.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
